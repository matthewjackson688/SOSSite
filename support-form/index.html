<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support Form - Share Our Story</title>
  <link rel="stylesheet" href="/SOSSite/styles.css" />
</head>

<body>

  <header class="wrap header">
    <div class="brand">
      <img src="/SOSSite/images/SOSLogo.jpg" alt="Site Logo" class="logo">
      <h1>Share Our Story</h1>
    </div>

    <nav class="nav">
      <a href="/SOSSite/">Home</a>
      <a href="/SOSSite/about/">About Us</a>
      <a href="/SOSSite/contact/">Contact Us</a>

      <div class="dropdown">
        <button class="dropbtn" type="button">Resources ▾</button>

        <div class="dropdown-content">
          <a href="/SOSSite/our-stories/">Our Stories</a>
          <a href="/SOSSite/supporters/">Supporters</a>
          <a href="/SOSSite/media/">Media</a>
          <a href="/SOSSite/publications/">Publications</a>
        </div>
      </div>

      <a href="/SOSSite/donate/">Donate</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="card supporters-info">
      <h2>Support Form</h2>
      <p>Complete this form and we will receive it by email.</p>

      <form id="supportForm" class="support-form" method="POST" action="https://formsubmit.co/matthewjackson688@gmail.com">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" id="formSubject" value="New #SOS support form submission">
        <input type="hidden" name="_next" id="formNext" value="">
        <input type="hidden" name="intent" id="formIntent" value="general">

        <label for="fullName">Full Name</label>
        <input id="fullName" name="full_name" type="text" required>

        <label for="email">Contact Email</label>
        <input id="email" name="contact_email" type="email" required>

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text">

        <label for="country">Country</label>
        <input id="country" name="country" type="text" required>

        <label for="organisation">Organisation (if applicable)</label>
        <input id="organisation" name="organisation" type="text">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <div class="form-actions">
          <button type="submit">Submit Form</button>
          <a id="formBackLink" href="/SOSSite/supporters/">Back</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="wrap small footer">
    <div class="social-row">
      <a href="mailto:hello@example.com" aria-label="Email">
        <img src="/SOSSite/images/envelope-circle.png" alt="Email">
      </a>
      <a href="https://www.facebook.com/profile.php?id=100089873220193" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <img src="/SOSSite/images/facebook-circle.png" alt="Facebook">
      </a>
      <a href="https://instagram.com/yourpage" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <img src="/SOSSite/images/instagram-circle.png" alt="Instagram">
      </a>
      <a href="https://linkedin.com/company/yourpage" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <img src="/SOSSite/images/linkedin-circle.png" alt="LinkedIn">
      </a>
      <a href="https://twitter.com/yourpage" target="_blank" rel="noopener noreferrer" aria-label="Twitter / X">
        <img src="/SOSSite/images/twitter-circle.png" alt="Twitter / X">
      </a>
    </div>

    <p>© <span id="year"></span> Me</p>
  </footer>

  <script src="/SOSSite/script.js"></script>
</body>
</html>
